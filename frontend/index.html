<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQMeal - Rescue Food, Save Lives</title>
    <!-- Modern Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">ResQMeal 🍽️</div>
        <ul class="nav-links">
            <li><a href="#" onclick="showSection('home')">Home</a></li>
            <li><a href="#" onclick="showSection('login')">Login</a></li>
        </ul>
    </nav>

    <!-- Main Container for Single Page Architecture -->
    <div class="container">
        
        <!-- Home Section -->
        <section id="home" class="active-section">
            <div class="hero">
                <h1>Don't waste food, <br> <span class="highlight">Donate it!</span></h1>
                <p>Connect surplus food from restaurants to NGOs and delivery partners in real-time.</p>
                <button class="btn-primary" onclick="showSection('login')">Get Started</button>
            </div>
        </section>

        <!-- Login / Signup Section -->
        <section id="login" class="hidden-section">
            <div class="auth-card">
                <h2>Welcome Back!</h2>
                <p class="subtitle">Login to your dashboard</p>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>
                    
                    <button type="submit" class="btn-primary full-width">Login</button>
                </form>
                
                <p class="switch-auth">Don't have an account? <a href="#" onclick="showSection('signup')">Sign up here</a></p>
            </div>
        </section>

        <!-- Signup Section -->
        <section id="signup" class="hidden-section">
            <div class="auth-card">
                <h2>Create Account</h2>
                <p class="subtitle">Join ResQMeal today</p>
                
                <form id="signupForm">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="signupName" required placeholder="Enter your name">
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" required placeholder="Create a password">
                    </div>
                    <div class="input-group">
                        <label>Role</label>
                        <select id="signupRole" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; margin-bottom: 20px;">
                            <option value="Restaurant">Restaurant</option>
                            <option value="NGO">NGO</option>
                            <option value="Delivery">Delivery Partner</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-primary full-width">Sign Up</button>
                </form>
                
                <p class="switch-auth">Already have an account? <a href="#" onclick="showSection('login')">Login here</a></p>
            </div>
        </section>

    </div>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
